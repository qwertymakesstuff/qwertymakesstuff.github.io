<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ScreenType Mobile</title>
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-title" content="ScreenType">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icons/screentype.svg">
    <link rel="icon" href="icons/screentype.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div>
          <h1>ScreenType</h1>
          <p id="saveState">Draft ready</p>
        </div>
        <div class="header-actions">
          <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle theme">O</button>
          <button id="downloadFountain" class="icon-button" type="button" aria-label="Download Fountain">V</button>
        </div>
      </header>

      <section class="title-editor" aria-label="Title page fields">
        <input id="scriptTitle" value="Untitled Screenplay" aria-label="Script title">
        <label>
          <span>Written by</span>
          <input id="scriptAuthor" value="" aria-label="Creator name" placeholder="Creator name">
        </label>
      </section>

      <main class="pages">
        <section class="page title-page" aria-label="Title page preview">
          <div id="titlePageTitle" class="title-page-title">Untitled Screenplay</div>
          <div class="title-page-credit">
            <div>Written by</div>
            <div id="titlePageAuthor">Creator name</div>
          </div>
        </section>

        <section class="page script-page" aria-label="Screenplay editor">
          <div id="editor" class="editor" contenteditable="true" spellcheck="true" aria-label="Script body"></div>
        </section>
      </main>

      <section class="mobile-panels">
        <details>
          <summary>Outline <span id="sceneCount">0</span></summary>
          <ol id="sceneList" class="scene-list"></ol>
        </details>
        <details>
          <summary>Cast <span id="castCount">0</span></summary>
          <div id="castList" class="chip-list"></div>
        </details>
        <details>
          <summary>Scratch</summary>
          <textarea id="scratchpad" aria-label="Scratch notes" placeholder="Loose ideas, beats, props, questions..."></textarea>
        </details>
        <details>
          <summary>Draft</summary>
          <dl class="stats">
            <div><dt>Pages</dt><dd id="pageCount">2</dd></div>
            <div><dt>Words</dt><dd id="wordCount">0</dd></div>
          </dl>
          <label class="toggle-row"><input id="focusMode" type="checkbox">Current line</label>
          <label class="toggle-row"><input id="autoCaps" type="checkbox" checked>Caps for cues</label>
        </details>
      </section>

      <nav class="format-bar" aria-label="Screenplay format controls">
        <button class="format-button active" type="button" data-format="scene">Scene</button>
        <button class="format-button" type="button" data-format="action">Action</button>
        <button class="format-button" type="button" data-format="character">Char</button>
        <button class="format-button" type="button" data-format="parenthetical">Paren</button>
        <button class="format-button" type="button" data-format="dialogue">Dialog</button>
        <button class="format-button" type="button" data-format="transition">Trans</button>
        <button id="addScene" class="format-button utility" type="button">+ Scene</button>
        <button id="newDraft" class="format-button utility" type="button">New</button>
      </nav>
    </div>

    <template id="lineTemplate">
      <p class="line action" data-format="action"><br></p>
    </template>

    <script src="script.js"></script>
  </body>
</html>
